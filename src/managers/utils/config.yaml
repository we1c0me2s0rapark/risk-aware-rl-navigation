# =============================================================================
# @file config.yaml
# @brief Configuration for CARLA-based simulation, sensors, and action space.
#
# Defines simulation timing, sensor specifications, and control constraints
# used by the perception and reinforcement learning pipeline.
# =============================================================================

# ----------------------------------------------------------------------------- 
# @section simulation Simulation settings
# @brief Core parameters controlling simulation timing and execution behaviour.
# -----------------------------------------------------------------------------
simulation:
  port: 2000                  # @brief TCP port used to connect to the CARLA server.
  sync_mode: true             # @brief Enables synchronous simulation stepping mode.
  dt: 0.05                    # @brief Fixed time step in seconds (simulation delta time).
  max_episode_length: 2000    # @brief Maximum number of steps in an episode.
  goal_threshold: 5.0         # @brief Distance threshold (metres) for reaching the goal.

# ----------------------------------------------------------------------------- 
# @section render Rendering settings
# @brief Defines the rendering mode of the environment.
# -----------------------------------------------------------------------------
render:
  root: results               # @brief Root directory for saving rendered outputs.
  is_display: 1               # @brief Whether to display the rendered environment during training.
  is_save_frames: 0           # @brief Whether to save individual frames of the rendered environment.

# ----------------------------------------------------------------------------- 
# @section sensors Sensor configuration
# @brief Defines camera and LiDAR characteristics and data representations.
# -----------------------------------------------------------------------------
sensors:

  # ---------------------------------------------------------------------------
  # @subsection camera RGB camera
  # @brief Configuration of the RGB camera for training and visualisation.
  # ---------------------------------------------------------------------------
  camera:
    train_resolution: { x: 84, y: 84 }     # @brief Input resolution (width × height) for machine learning models.
    view_resolution: { x: 800, y: 600 }    # @brief Display resolution for visualisation.
    channels: 3                            # @brief Number of colour channels (RGB).

    # @note Total elements per frame:
    #       84 × 84 × 3 = 21,168

  # ---------------------------------------------------------------------------
  # @subsection lidar LiDAR sensor
  # @brief Configuration of the LiDAR sensor for spatial perception.
  # ---------------------------------------------------------------------------
  lidar:
    points: 1024                          # @brief Number of sampled points per frame.
    features_per_point: 3                 # @brief Number of features per point (x, y, z).
    range: 50                             # @brief Maximum sensing range in metres.
    train_resolution: { x: 64, y: 64 }    # @brief Input resolution (width × height) for machine learning models.
    channels: 1                           # @brief Number of channels (greyscale/monochrome).

    # @note Grid representation:
    #       64 × 64 × 1 = 4,096

# ----------------------------------------------------------------------------- 
# @section actions Action space constraints
# @brief Defines the valid control input ranges for the agent.
# -----------------------------------------------------------------------------
actions:
  steer: [-1.0, 1.0]        # @brief Steering angle (-1.0 full left, 1.0 full right).
  throttle: [0.0, 1.0]      # @brief Throttle input (0.0 no input, 1.0 maximum).
  brake: [0.0, 1.0]         # @brief Brake input (0.0 no input, 1.0 full braking).

# -----------------------------------------------------------------------------
# @section risk Risk module settings
# @brief Parameters controlling risk-aware feature computation.
# -----------------------------------------------------------------------------
risk:
  top_k: 5                          # @brief Number of nearest agents considered in risk evaluation.
  waypoints_ahead: 5                # @brief Number of future waypoints considered for path-based risk.
  search_radius: 50.0               # @brief Maximum search radius (metres) for nearby agents.
  ttc_sigma: 3.0                    # @brief Gaussian smoothing parameter for time-to-collision (TTC).
  ttc_max: 10.0                     # @brief Maximum TTC considered (seconds) for normalisation.
  category_weights:
    vehicle: 1.0                    # @brief Weight assigned to vehicle agents.
    walker: 2.5                     # @brief Weight assigned to pedestrian agents.
    cyclist: 1.8                    # @brief Weight assigned to cyclist agents.
  reward:
    goal_progress_scale: 5.0        # @brief Multiplier for distance progress reward
    heading_alignment_scale: 0.5    # @brief Weight for alignment with waypoint direction
    wrong_way_penalty: 2.0          # @brief Penalty for driving against lane direction
    speed_reward_scale: 0.1         # @brief Reward per m/s of forward speed
    speed_cap: 8.0                  # @brief Maximum speed (m/s) contributing to reward
    collision_penalty: 20.0         # @brief Penalty applied on collision
    time_penalty: 0.01              # @brief Small per-step penalty to encourage efficiency
    ttc_threshold: 3.0              # @brief TTC threshold (seconds) for risk-aware penalty
    ttc_penalty_scale: 1.0          # @brief Scaling factor for risk-based TTC penalty

# -----------------------------------------------------------------------------
# @section ppo Proximal Policy Optimisation (PPO) settings
# @brief Hyperparameters for training the reinforcement learning agent.
# -----------------------------------------------------------------------------
ppo:
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  lr_actor: 3e-4
  lr_critic: 3e-4
  batch_size: 64
  rollout_steps: 2048
  epochs: 10