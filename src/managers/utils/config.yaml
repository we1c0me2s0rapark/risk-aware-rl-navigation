# =============================================================================
# @file config.yaml
# @brief Configuration for CARLA-based simulation, sensors, and action space.
#
# Defines simulation timing, sensor specifications, and control constraints
# used by the perception and reinforcement learning pipeline.
# =============================================================================

# -----------------------------------------------------------------------------
# @section training Shared training settings
# @brief Parameters shared across all RL algorithms for fair comparison.
# -----------------------------------------------------------------------------
training:
  total_steps: 1_000_000      # @brief Total environment steps for all algorithms (PPO, SAC, CVaR-SAC).
  seed: 42                    # @brief Base random seed. Episode N uses seed+N so all algorithms see the same environments.

# -----------------------------------------------------------------------------
# @section simulation Simulation settings
# @brief Core parameters controlling simulation timing and execution behaviour.
# -----------------------------------------------------------------------------
simulation:
  port: 2000                    # @brief TCP port used to connect to the CARLA server.
  sync_mode: true               # @brief Enables synchronous simulation stepping mode.
  dt: 0.05                      # @brief Fixed time step in seconds (simulation delta time).
  max_episode_length: 2000      # @brief Maximum number of steps in an episode.
  goal_threshold: 2.0           # @brief Distance threshold (metres) for reaching the goal.
  off_route_distance: 15.0      # @brief Distance threshold (metres) beyond which the episode terminates and off-route penalty is at maximum.
  waypoint_advance_radius: 4.0  # @brief Distance threshold (metres) within which the next waypoint is considered reached.
  min_route_distance: 50.0      # @brief Minimum straight-line distance (metres) between start and goal spawn points.
  min_route_waypoints: 50       # @brief Minimum waypoints a valid route must have (2m spacing ≈ 100m of road).
  num_npc_vehicles: 15          # @brief Number of NPC vehicles spawned by Traffic Manager per episode.
  min_npc_distance: 10.0        # @brief Minimum distance (metres) between NPC spawn points and the ego vehicle.
  tm_port: 8000                 # @brief CARLA Traffic Manager port.
  num_static_obstacles: 5       # @brief Stationary vehicles placed on the ego's route per episode.
  static_obstacle_min_gap: 20   # @brief Minimum waypoints ahead of ego spawn (~40 m) before first obstacle.
  steer_smoothing: 0.6          # @brief EMA coefficient for steering (low = responsive to turns, high = smooth but sluggish).
  throttle_smoothing: 0.7       # @brief EMA coefficient for throttle/speed smoothing (high = suppresses oscillation).
  stuck_timeout: 50             # @brief Steps below 0.5 m/s (outside stopping) before episode ends as stuck (~2.5 s).
  risk_stop_ttc: 2.0            # @brief TTC threshold (seconds) below which a stopped vehicle is treated as waiting (not stuck).
  lookahead_dist: 6.0           # @brief Distance (metres) ahead on the route used for cross-track/heading error and viz line.

# ----------------------------------------------------------------------------- 
# @section render Rendering settings
# @brief Defines the rendering mode of the environment.
# -----------------------------------------------------------------------------
render:
  root: results               # @brief Root directory for saving rendered outputs.
  is_display: 1               # @brief Whether to display the rendered environment during training.
  is_save_frames: 0           # @brief Whether to save individual frames of the rendered environment.

# ----------------------------------------------------------------------------- 
# @section sensors Sensor configuration
# @brief Defines camera and LiDAR characteristics and data representations.
# -----------------------------------------------------------------------------
sensors:

  # ---------------------------------------------------------------------------
  # @subsection camera RGB camera
  # @brief Configuration of the RGB camera for training and visualisation.
  # ---------------------------------------------------------------------------
  camera:
    train_resolution: { x: 84, y: 84 }     # @brief Input resolution (width × height) for machine learning models.
    view_resolution: { x: 800, y: 600 }    # @brief Display resolution for visualisation.
    channels: 3                            # @brief Number of colour channels (RGB).

    # @note Total elements per frame:
    #       84 × 84 × 3 = 21,168

  # ---------------------------------------------------------------------------
  # @subsection lidar LiDAR sensor
  # @brief Configuration of the LiDAR sensor for spatial perception.
  # ---------------------------------------------------------------------------
  lidar:
    points: 1024                          # @brief Number of sampled points per frame.
    features_per_point: 3                 # @brief Number of features per point (x, y, z).
    range: 50                             # @brief Maximum sensing range in metres.
    train_resolution: { x: 64, y: 64 }    # @brief Input resolution (width × height) for machine learning models.
    channels: 1                           # @brief Number of channels (greyscale/monochrome).

    # @note Grid representation:
    #       64 × 64 × 1 = 4,096

# ----------------------------------------------------------------------------- 
# @section actions Action space constraints
# @brief Defines the valid control input ranges for the agent.
# -----------------------------------------------------------------------------
actions:
  steer: [-1.0, 1.0]        # @brief Steering angle (-1.0 full left, 1.0 full right).
  throttle: [0.0, 1.0]      # @brief Throttle input (0.0 no input, 1.0 maximum).
  brake: [0.0, 1.0]         # @brief Brake input (0.0 no input, 1.0 full braking).

# -----------------------------------------------------------------------------
# @section risk Risk module settings
# @brief Parameters controlling risk-aware feature computation.
# -----------------------------------------------------------------------------
risk:
  top_k: 5                          # @brief Number of nearest agents considered in risk evaluation.
  blend_deadzone: 0.3               # @brief risk_score below which the controller has full authority (no RL blending).
  blend_scale: 3.0                  # @brief Slope of the blend ramp above blend_deadzone; RL reaches full authority at deadzone + 1/scale.
  blend_junction_cap: 0.3           # @brief Maximum RL blend inside a junction; controller retains majority authority through turns.
  waypoints_ahead: 20               # @brief Number of future waypoints considered for path-based risk.
  search_radius: 50.0               # @brief Maximum search radius (metres) for nearby agents.
  ttc_sigma: 3.0                    # @brief Gaussian smoothing parameter for time-to-collision (TTC).
  ttc_max: 10.0                     # @brief Maximum TTC considered (seconds) for normalisation.
  category_weights:
    vehicle: 1.0                    # @brief Weight assigned to vehicle agents.
    walker: 2.5                     # @brief Weight assigned to pedestrian agents.
    cyclist: 1.8                    # @brief Weight assigned to cyclist agents.
  reward:
    goal_progress_scale: 15.0       # @brief Multiplier for distance progress reward (raised: RL must drive progress without controller assist).
    heading_alignment_scale: 8.0    # @brief Weight for alignment with waypoint direction.
    speed_reward_scale: 0.15        # @brief Reward per m/s of forward speed (raised: encourage RL to accelerate without controller push).
    speed_cap: 7.0                  # @brief Maximum speed (m/s) contributing to reward; excess is penalised by overspeed_scale per m/s.
    overspeed_scale: 2.0            # @brief Penalty per m/s above speed_cap (e.g. 9 m/s → −4.0/step).
    collision_penalty: 300.0        # @brief Penalty applied on collision
    off_road_penalty: 250.0         # @brief One-shot penalty when vehicle leaves the drivable road surface.
    time_penalty: 2.0               # @brief Per-step penalty to discourage idling
    ttc_penalty_scale: 3.0          # @brief Scaling factor for continuous risk penalty (applied to smooth exp-decay risk_score).
    wrong_way_scale: 2.0            # @brief Per-step penalty for driving against the lane direction (wrong_way_risk ∈ [0,1]).
    lateral_scale: 25.0             # @brief Max lateral penalty at off_route_distance (replaces off_route_penalty_scale + cross_track_scale).
    lateral_exponent: 3.0           # @brief Convexity of the exponential lateral penalty; gradient at d=1 is e^k × gradient at d=0.
    red_light_penalty: 10.0         # @brief Per-step penalty for moving through a red or yellow traffic light.

# -----------------------------------------------------------------------------
# @section ppo Proximal Policy Optimisation (PPO) settings
# @brief Hyperparameters for training the reinforcement learning agent.
# -----------------------------------------------------------------------------
ppo:
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  lr_actor: 3e-4
  lr_critic: 3e-4
  batch_size: 64
  rollout_size: 2048
  epochs: 10

# -----------------------------------------------------------------------------
# @section sac Soft Actor-Critic (SAC) settings
# @brief Hyperparameters for off-policy SAC training.
# -----------------------------------------------------------------------------
sac:
  batch_size: 256               # @brief Minibatch size for each SAC update.
  buffer_capacity: 500_000      # @brief Maximum number of transitions in the replay buffer.
  learning_starts: 5_000        # @brief Warm-up steps running the controller as expert before RL training begins.
  bc_steps: 2000                # @brief Gradient steps of behaviour-cloning pre-training on controller demos after warm-up.
  bc_lr: 0.0001                   # @brief Learning rate for the BC pre-training phase (lower than SAC lr to avoid overshooting).
  save_every: 10_000            # @brief Steps between checkpoint saves.
  log_every: 1_000              # @brief Steps between periodic log outputs.
  update_every: 8               # @brief Steps between gradient updates after learning_starts.

# -----------------------------------------------------------------------------
# @section cvar_sac CVaR Soft Actor-Critic (CVaR-SAC) settings
# @brief Hyperparameters for risk-aware distributional SAC training.
# -----------------------------------------------------------------------------
cvar_sac:
  batch_size: 256               # @brief Minibatch size for each CVaR-SAC update.
  buffer_capacity: 500_000      # @brief Maximum number of transitions in the replay buffer.
  learning_starts: 5_000        # @brief Warm-up steps running the controller as expert before RL training begins.
  bc_steps: 2000                # @brief Gradient steps of behaviour-cloning pre-training on controller demos after warm-up.
  bc_lr: 0.0001                   # @brief Learning rate for the BC pre-training phase (lower than SAC lr to avoid overshooting).
  save_every: 10_000            # @brief Steps between checkpoint saves.
  log_every: 1_000              # @brief Steps between periodic log outputs.
  n_quantiles: 32               # @brief Number of quantiles for the distributional critic.
  cvar_alpha: 0.1               # @brief CVaR confidence level (worst fraction of outcomes to optimise for).
  update_every: 8               # @brief Steps between gradient updates after learning_starts.
  critic_warmup_steps: 500      # @brief Critic-only gradient steps after BC before actor updates begin.